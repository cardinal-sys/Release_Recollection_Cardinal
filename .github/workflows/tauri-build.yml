name: 〈Native Embodiment〉Tauri Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target universal-apple-darwin'
            rust-targets: 'aarch64-apple-darwin,x86_64-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
            rust-targets: ''
          - platform: windows-latest
            args: ''
            rust-targets: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: 〈 Checkout 〉
        uses: actions/checkout@v4

      - name: 〈 Setup Node.js 〉
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 〈 Install Rust toolchain 〉
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: 〈 Rust cache 〉
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: 〈 Linux dependencies 〉
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            libdbus-1-dev \
            pkg-config \
            libudev-dev

      - name: 〈 Install npm dependencies 〉
        run: npm install

      # ====== macOS: Build → Patch → Re-bundle → Upload ======

      - name: 〈 macOS Build 〉
        if: matrix.platform == 'macos-latest'
        run: npm run tauri build -- ${{ matrix.args }}

      - name: 〈 macOS Patch Info.plist + Re-create .dmg 〉
        if: matrix.platform == 'macos-latest'
        shell: bash
        run: |
          set -euxo pipefail

          APP_DIR="src-tauri/target/universal-apple-darwin/release/bundle/macos"
          DMG_DIR="src-tauri/target/universal-apple-darwin/release/bundle/dmg"
          APP_PATH="${APP_DIR}/Cardinal Editor.app"
          PLIST="${APP_PATH}/Contents/Info.plist"

          # 確認
          ls -la "${APP_DIR}/" || true
          ls -la "${DMG_DIR}/" || true

          if [ ! -f "${PLIST}" ]; then
            echo "::error::Info.plist not found at ${PLIST}"
            exit 1
          fi

          # Bluetooth permission キーを追加
          /usr/libexec/PlistBuddy -c "Add :NSBluetoothAlwaysUsageDescription string Cardinal_Editor_uses_Bluetooth" "${PLIST}" 2>/dev/null \
            || /usr/libexec/PlistBuddy -c "Set :NSBluetoothAlwaysUsageDescription Cardinal_Editor_uses_Bluetooth" "${PLIST}"
          /usr/libexec/PlistBuddy -c "Set :NSBluetoothAlwaysUsageDescription 'Cardinal Editor uses Bluetooth to connect to your ZMK keyboard for live keymap sync.'" "${PLIST}"

          /usr/libexec/PlistBuddy -c "Add :NSBluetoothPeripheralUsageDescription string Cardinal_Editor_uses_Bluetooth" "${PLIST}" 2>/dev/null \
            || /usr/libexec/PlistBuddy -c "Set :NSBluetoothPeripheralUsageDescription Cardinal_Editor_uses_Bluetooth" "${PLIST}"
          /usr/libexec/PlistBuddy -c "Set :NSBluetoothPeripheralUsageDescription 'Cardinal Editor uses Bluetooth to connect to your ZMK keyboard for live keymap sync.'" "${PLIST}"

          # 確認 (echo で出力)
          echo "=== After patch ==="
          /usr/libexec/PlistBuddy -c "Print :NSBluetoothAlwaysUsageDescription" "${PLIST}"
          /usr/libexec/PlistBuddy -c "Print :NSBluetoothPeripheralUsageDescription" "${PLIST}"

          # 既存 .dmg を削除して、patch 済み .app から再作成
          OLD_DMG=$(find "${DMG_DIR}" -maxdepth 1 -name "*.dmg" -type f -print -quit || true)
          if [ -n "${OLD_DMG}" ]; then
            echo "Removing old DMG: ${OLD_DMG}"
            rm -f "${OLD_DMG}"
            echo "Creating new DMG from patched .app"
            hdiutil create -srcfolder "${APP_PATH}" -fs HFS+ -volname "Cardinal Editor" -format UDZO "${OLD_DMG}"
            ls -la "${OLD_DMG}"
          else
            echo "::warning::No .dmg found to re-create"
          fi

          # .app.tar.gz も再作成（もしあれば）
          OLD_TARGZ=$(find "${APP_DIR}" -maxdepth 1 -name "*.app.tar.gz" -type f -print -quit || true)
          if [ -n "${OLD_TARGZ}" ]; then
            echo "Re-creating ${OLD_TARGZ}"
            rm -f "${OLD_TARGZ}"
            ( cd "${APP_DIR}" && tar czf "$(basename "${OLD_TARGZ}")" "Cardinal Editor.app" )
          fi

      - name: 〈 macOS Upload to Release 〉
        if: matrix.platform == 'macos-latest'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euxo pipefail
          TAG="${{ github.ref_name }}"

          # Release を冪等に作成
          gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --draft \
            --title "《 Cardinal Editor 》$TAG" \
            --notes "Cardinal Editor デスクトップ版（Phase A-D 完成 / Bluetooth permission 入り）" \
            2>/dev/null || true

          # Bundle ディレクトリから dmg / app.tar.gz をアップロード
          find src-tauri/target/universal-apple-darwin/release/bundle \
            \( -name "*.dmg" -o -name "*.app.tar.gz" \) -print0 | \
            while IFS= read -r -d '' ARTIFACT; do
              echo "Uploading: ${ARTIFACT}"
              gh release upload "$TAG" "${ARTIFACT}" --repo "$GITHUB_REPOSITORY" --clobber
            done

      # ====== Linux / Windows: tauri-action で一発 ======

      - name: 〈 Build & Release (Linux/Windows) 〉
        if: matrix.platform != 'macos-latest'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: '《 Cardinal Editor 》${{ github.ref_name }}'
          releaseBody: |
            Cardinal Editor デスクトップ版です。OS ネイティブ Bluetooth API により
            macOS HID 接続中でも Live Sync 接続可能。

            - macOS: `.dmg` (Universal: Apple Silicon + Intel) — Bluetooth permission 入り
            - Windows: `.msi`
            - Linux: `.deb` / `.AppImage` / `.rpm`
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
