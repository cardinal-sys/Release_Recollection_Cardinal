name: 〈Native Embodiment〉Tauri Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'リリースタグ (例: v0.1.0) — workflow_dispatch 用'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target universal-apple-darwin'
            rust-targets: 'aarch64-apple-darwin,x86_64-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
            rust-targets: ''
          - platform: windows-latest
            args: ''
            rust-targets: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: 〈 Checkout 〉
        uses: actions/checkout@v4

      - name: 〈 Setup Node.js 〉
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 〈 Install Rust toolchain 〉
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: 〈 Rust cache 〉
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: 〈 Linux dependencies 〉
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            libdbus-1-dev \
            pkg-config \
            libudev-dev

      - name: 〈 Install npm dependencies 〉
        run: npm install

      - name: 〈 Build & Release 〉
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: '《 Cardinal Editor 》${{ github.ref_name }}'
          releaseBody: |
            ## ◆ Native Embodiment

            Cardinal Editor デスクトップ版です。OS ネイティブ Bluetooth API により
            macOS HID 接続中でも Live Sync 接続可能。

            - macOS: `.dmg` (Universal: Apple Silicon + Intel)
            - Windows: `.msi`
            - Linux: `.deb` / `.AppImage`

            ### 使い方
            ダウンロード → インストール → 起動 → 〈 Connect via Bluetooth 〉
            で従来の Web Bluetooth より確実に接続できます。

            🌸 〈Cardinal Editor〉— ZMK keymap editor with Live Sync
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
