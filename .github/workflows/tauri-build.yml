name: 〈Native Embodiment〉Tauri Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'リリースタグ (例: v0.1.0) — workflow_dispatch 用'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target universal-apple-darwin'
            rust-targets: 'aarch64-apple-darwin,x86_64-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
            rust-targets: ''
          - platform: windows-latest
            args: ''
            rust-targets: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: 〈 Checkout 〉
        uses: actions/checkout@v4

      - name: 〈 Setup Node.js 〉
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 〈 Install Rust toolchain 〉
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: 〈 Rust cache 〉
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: 〈 Linux dependencies 〉
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            libdbus-1-dev \
            pkg-config \
            libudev-dev

      - name: 〈 Install npm dependencies 〉
        run: npm install

      - name: 〈 Build (no bundle) — generate .app first 〉
        if: matrix.platform == 'macos-latest'
        run: npm run tauri build -- --no-bundle ${{ matrix.args }}

      - name: 〈 Patch Info.plist (Bluetooth permission) 〉
        if: matrix.platform == 'macos-latest'
        run: |
          # universal binary 後の app は target/universal-apple-darwin/release/bundle/macos/ には未生成
          # 代わりに src-tauri/gen 配下のテンプレートに NSBluetooth キーを直接埋め込む
          # tauri-bundler は Info.plist 生成時に gen/apple/.../Info.plist を参照しないので、
          # bundle 後の .app に対して PlistBuddy で patch する方式に変更。
          echo "Will patch after bundle step"

      - name: 〈 Bundle 〉
        if: matrix.platform == 'macos-latest'
        run: npm run tauri bundle -- ${{ matrix.args }}

      - name: 〈 Patch built .app Info.plist 〉
        if: matrix.platform == 'macos-latest'
        run: |
          set -e
          for APP in $(find src-tauri/target -name "*.app" -type d); do
            PLIST="$APP/Contents/Info.plist"
            if [ -f "$PLIST" ]; then
              echo "Patching $PLIST"
              /usr/libexec/PlistBuddy -c "Add :NSBluetoothAlwaysUsageDescription string 'Cardinal Editor uses Bluetooth to connect to your ZMK keyboard for live keymap sync.'" "$PLIST" 2>/dev/null \
                || /usr/libexec/PlistBuddy -c "Set :NSBluetoothAlwaysUsageDescription 'Cardinal Editor uses Bluetooth to connect to your ZMK keyboard for live keymap sync.'" "$PLIST"
              /usr/libexec/PlistBuddy -c "Add :NSBluetoothPeripheralUsageDescription string 'Cardinal Editor uses Bluetooth to connect to your ZMK keyboard for live keymap sync.'" "$PLIST" 2>/dev/null \
                || /usr/libexec/PlistBuddy -c "Set :NSBluetoothPeripheralUsageDescription 'Cardinal Editor uses Bluetooth to connect to your ZMK keyboard for live keymap sync.'" "$PLIST"
              echo "Patched OK"
            fi
          done

      - name: 〈 Re-create .dmg with patched .app 〉
        if: matrix.platform == 'macos-latest'
        run: |
          set -e
          # Tauri が生成した .dmg は patch 前の .app を含むので、
          # patch 済み .app を新しい .dmg として作り直す
          for DMG in $(find src-tauri/target -name "*.dmg"); do
            APP_DIR=$(dirname "$DMG")
            APP=$(find "$APP_DIR" -name "*.app" -type d | head -1)
            if [ -n "$APP" ] && [ -f "$DMG" ]; then
              echo "Re-creating $DMG from $APP"
              rm "$DMG"
              hdiutil create -srcfolder "$APP" -fs HFS+ -volname "Cardinal Editor" -format UDZO "$DMG"
            fi
          done

      - name: 〈 Build & Release (non-macOS) 〉
        if: matrix.platform != 'macos-latest'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: '《 Cardinal Editor 》${{ github.ref_name }}'
          releaseBody: |
            ## ◆ Native Embodiment

            Cardinal Editor デスクトップ版です。OS ネイティブ Bluetooth API により
            macOS HID 接続中でも Live Sync 接続可能。

            - macOS: `.dmg` (Universal: Apple Silicon + Intel)
            - Windows: `.msi`
            - Linux: `.deb` / `.AppImage`
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: 〈 Upload macOS artifacts to Release 〉
        if: matrix.platform == 'macos-latest'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          TAG="${{ github.ref_name }}"
          # Release を確実に作成（既存なら何もしない）
          gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --draft \
            --title "《 Cardinal Editor 》$TAG" \
            --notes "Cardinal Editor デスクトップ版（Phase A-D 完成）" \
            2>/dev/null || true

          # ファイル名のスペース対応 (find -print0 + read -d '')
          find src-tauri/target \( -name "*.dmg" -o -name "*.app.tar.gz" \) -print0 | \
            while IFS= read -r -d '' ARTIFACT; do
              echo "Uploading $ARTIFACT"
              gh release upload "$TAG" "$ARTIFACT" --repo "$GITHUB_REPOSITORY" --clobber
            done
