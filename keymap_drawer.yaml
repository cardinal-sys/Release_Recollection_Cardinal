draw_config:
  key_h: 60
  key_w: 60
  split_gap: 40
  combo_w: 36
  combo_h: 32
  n_cols: 2
  draw_key_sides: true
  svg_extra_style: |
    svg.keymap { background-color: #020712; fill: #e2f0ff; }
    rect.key { fill: #070e20; stroke: #0e1e3c; }
    rect.side { fill: #0b1830; filter: none; }
    rect.held, rect.combo.held { fill: #030b24; stroke: #1d4ed8; stroke-width: 2; filter: drop-shadow(0 0 6px rgba(29,78,216,1.0)) drop-shadow(0 0 16px rgba(29,78,216,0.45)); }
    rect.combo, rect.combo-separate { fill: #080e24; stroke: #6366f1; stroke-width: 2; filter: drop-shadow(0 0 6px rgba(99,102,241,1.0)) drop-shadow(0 0 16px rgba(99,102,241,0.45)); }
    rect.ghost { stroke: #67e8f9; }
    text.trans { fill: #090f1e; }
    text.tap { filter: drop-shadow(0 0 4px rgba(226,240,255,0.55)); }
    text.hold { fill: #38bdf8; font-size: 9px; filter: drop-shadow(0 0 5px rgba(56,189,248,0.75)) drop-shadow(0 0 10px rgba(56,189,248,0.3)); }
    text.shifted { fill: #7dd3fc; }
    text.label { fill: #67e8f9; stroke: #020712; stroke-width: 6; paint-order: stroke; filter: drop-shadow(0 0 8px rgba(103,232,249,0.9)); }
    text.footer { stroke: #020712; }
    text.combo { font-size: 14px; fill: #a5f3fc; filter: drop-shadow(0 0 5px rgba(165,243,252,0.7)); }

